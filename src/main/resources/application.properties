spring.application.name=project

# Database Configuration
# In production, inject credentials via environment variables.
# PostgreSQL requires: DB_URL=jdbc:postgresql://host:port/db?sslmode=require
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/event_manager_db}
spring.datasource.username=${DB_USERNAME:event_user}
spring.datasource.password=${DB_PASSWORD:Paljor1206}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

# JWT Configuration
# IMPORTANT: In production, inject this via an environment variable (e.g. JWT_SECRET)
# instead of storing it in source code.  This key was generated with: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:CCZdzIK9ovJ50kuBnQbxmjgBTOEvUTwEuZXL/2OSTJo=}
# Token lifetime in milliseconds — 3600000 = 1 hour
app.jwt.expiration-ms=3600000

# Weather — now using Open-Meteo (https://open-meteo.com/), which is free,
# requires no API key, and covers forecasts up to 16 days ahead.
# The owm.api.key property is no longer used and can be removed.
# owm.api.key=YOUR_OWM_API_KEY_HERE
