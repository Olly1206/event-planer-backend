# Local dev profile using in-memory H2 so the app can run without MySQL
spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Create-drop keeps the schema clean each run — good for local testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Reduce Hikari pool sizes for local runs
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
